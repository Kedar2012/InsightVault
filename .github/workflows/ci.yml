name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-lint:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6380:6379   # ✅ map Redis to the port your app expects
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: insightvault.settings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest --disable-warnings -q

      - name: Lint code
        run: pylint insightvault
