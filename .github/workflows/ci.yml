name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-lint:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: insightvault.settings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --disable-warnings -q

      - name: Lint code
        run: pylint insightvault
