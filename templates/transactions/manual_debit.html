{% extends "index.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Manual Debit for {{ account.user.username }}</h2>

  {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-danger">Deduct</button>
  </form>
</div>
{% endblock %}
