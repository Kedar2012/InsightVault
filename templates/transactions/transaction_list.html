{% extends "index.html" %}
{% block content %}

<div class="tran-wrapper">
  <div class="container mt-4">
    <h2>My Transactions</h2>

    <table class="table table-striped">
      <thead>
        <tr>
          <th>Amount</th>
          <th>Type</th>
          <th>Description</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody>
        {% for tx in transactions %}
        <tr>
          <td>₹{{ tx.amount }}</td>
          <td>{{ tx.transaction_type|title }}</td>
          <td>{{ tx.description }}</td>
          <td>{{ tx.timestamp }}</td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="4">No transactions yet.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <a href="{% url 'transaction_create' %}" class="btn btn-success">New Transaction</a>
  </div>
</div>
{% endblock %}
